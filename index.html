<script>

/* ⭐ STAR BACKGROUND */

const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for (let i = 0; i < 120; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    vx: (Math.random() - 0.5) * 0.3,
    vy: (Math.random() - 0.5) * 0.3
  });
}

function animateStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  stars.forEach(star => {
    star.x += star.vx;
    star.y += star.vy;

    if (star.x < 0 || star.x > canvas.width) star.vx *= -1;
    if (star.y < 0 || star.y > canvas.height) star.vy *= -1;

    ctx.beginPath();
    ctx.arc(star.x, star.y, 2, 0, Math.PI * 2);
    ctx.fillStyle = "white";
    ctx.fill();
  });

  for (let i = 0; i < stars.length; i++) {
    for (let j = i + 1; j < stars.length; j++) {
      let dx = stars[i].x - stars[j].x;
      let dy = stars[i].y - stars[j].y;
      let distance = Math.sqrt(dx * dx + dy * dy);

      if (distance < 120) {
        ctx.beginPath();
        ctx.moveTo(stars[i].x, stars[i].y);
        ctx.lineTo(stars[j].x, stars[j].y);
        ctx.strokeStyle = "rgba(255,255,255,0.08)";
        ctx.stroke();
      }
    }
  }

  requestAnimationFrame(animateStars);
}

animateStars();

/* 💬 CHAT LOGIC */

const BACKEND_URL = "https://esther-ai-1.onrender.com/chat";

async function sendMessage(option = null) {

  const input = document.getElementById("userInput");
  const language = document.getElementById("languageSelect").value;
  const chatBox = document.getElementById("chatBox");
  const transportDiv = document.getElementById("transportOptions");

  let message = option || input.value.trim();
  if (!message) return;

  chatBox.innerHTML += `<div class="message user">You: ${message}</div>`;
  input.value = "";
  transportDiv.innerHTML = "";

  try {

    const response = await fetch(BACKEND_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message, language })
    });

    if (!response.ok) {
      throw new Error("Server returned " + response.status);
    }

    const data = await response.json();

    const reply = data.reply || "⚠️ No reply received.";

    chatBox.innerHTML += `<div class="message bot">Esther: ${reply}</div>`;
    chatBox.scrollTop = chatBox.scrollHeight;

    if (reply.toLowerCase().includes("walking") ||
        reply.toLowerCase().includes("bus") ||
        reply.toLowerCase().includes("tram")) {

      transportDiv.innerHTML = `
        <button onclick="sendMessage('Walking')">🚶 Walking</button>
        <button onclick="sendMessage('Bus')">🚌 Bus</button>
        <button onclick="sendMessage('Tram')">🚋 Tram</button>
        <button onclick="sendMessage('Uber')">🚗 Uber</button>
      `;
    }

    const map = document.getElementById("map");
    map.src = "https://www.google.com/maps?q=" 
      + encodeURIComponent(message + " Manchester") 
      + "&output=embed";

  } catch (error) {

    console.error("Error:", error);

    chatBox.innerHTML += `
      <div class="message bot">
        ⚠️ Connection error. Check backend logs.
      </div>
    `;

    chatBox.scrollTop = chatBox.scrollHeight;
  }
}

function startSocietyMatch() {

  `;

  chatBox.scrollTop = chatBox.scrollHeight;
}
